apiVersion: batch/v1
kind: Job
metadata:
  name: nvidia-probe
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: nvidia-probe
          image: nvidia-probe:latest
          # If NVIDIA device plugin is installed, this is all you need.
          # The plugin handles mounting /dev/nvidia* and libnvidia-ml.so.
          resources:
            limits:
              nvidia.com/gpu: 1
  backoffLimit: 0
